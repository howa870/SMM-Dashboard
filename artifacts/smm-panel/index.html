    <!-- Theme init: applies 'dark' class before first paint to prevent flash -->
    <script>
      (function(){
        var s = localStorage.getItem('theme');
        if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Twemoji: cross-platform consistent emoji rendering -->
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      (function() {
        var _twemojiTimer = null;
        function applyTwemoji() {
          if (window.twemoji) {
            twemoji.parse(document.body, {
              folder: 'svg',
              ext: '.svg',
              base: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/'
            });
          }
        }
        // Initial parse after DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyTwemoji);
        } else {
          applyTwemoji();
        }
        // Re-run after React navigation with debounce
        var observer = new MutationObserver(function() {
          clearTimeout(_twemojiTimer);
          _twemojiTimer = setTimeout(applyTwemoji, 200);
        });
        observer.observe(document.getElementById('root') || document.body, {
          childList: true,
          subtree: true
        });
      })();
    </script>
