openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SMM Panel API - Perfect Follow
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: platforms
    description: Platform operations
  - name: services
    description: Service operations
  - name: orders
    description: Order operations
  - name: payments
    description: Payment operations
  - name: users
    description: User operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /platforms:
    get:
      operationId: getPlatforms
      tags: [platforms]
      summary: Get all platforms
      responses:
        "200":
          description: List of platforms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Platform"
    post:
      operationId: createPlatform
      tags: [platforms]
      summary: Create a platform (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformBody"
      responses:
        "201":
          description: Platform created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Platform"

  /platforms/{id}:
    get:
      operationId: getPlatform
      tags: [platforms]
      summary: Get a platform by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Platform"
    put:
      operationId: updatePlatform
      tags: [platforms]
      summary: Update a platform (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformBody"
      responses:
        "200":
          description: Platform updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Platform"
    delete:
      operationId: deletePlatform
      tags: [platforms]
      summary: Delete a platform (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Platform deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /services:
    get:
      operationId: getServices
      tags: [services]
      summary: Get all services
      parameters:
        - name: platformId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    put:
      operationId: updateService
      tags: [services]
      summary: Update a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get user orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: Get user payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a manual payment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/upload-receipt:
    post:
      operationId: uploadReceipt
      tags: [payments]
      summary: Upload payment receipt image (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadReceiptBody"
      responses:
        "200":
          description: Receipt uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadReceiptResponse"

  /users/balance:
    get:
      operationId: getBalance
      tags: [users]
      summary: Get current user balance
      responses:
        "200":
          description: User balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [users]
      summary: Get dashboard stats for current user
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Admin - Get all users
      responses:
        "200":
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/balance:
    put:
      operationId: adminUpdateUserBalance
      tags: [admin]
      summary: Admin - Update user balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBalanceBody"
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/orders:
    get:
      operationId: adminGetOrders
      tags: [admin]
      summary: Admin - Get all orders
      responses:
        "200":
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}/status:
    put:
      operationId: adminUpdateOrderStatus
      tags: [admin]
      summary: Admin - Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/payments:
    get:
      operationId: adminGetPayments
      tags: [admin]
      summary: Admin - Get all payments
      responses:
        "200":
          description: List of all payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /admin/payments/{id}/approve:
    put:
      operationId: adminApprovePayment
      tags: [admin]
      summary: Admin - Approve a payment and credit balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/payments/{id}/reject:
    put:
      operationId: adminRejectPayment
      tags: [admin]
      summary: Admin - Reject a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - Get overall system stats
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        balance:
          type: number
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - balance
        - role
        - createdAt

    Platform:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        servicesCount:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        color:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - icon
        - servicesCount
        - status
        - color
        - createdAt

    CreatePlatformBody:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        status:
          type: string
          enum: [active, inactive]
        color:
          type: string
      required:
        - name
        - icon
        - status
        - color

    Service:
      type: object
      properties:
        id:
          type: integer
        platformId:
          type: integer
        platformName:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        minOrder:
          type: integer
        maxOrder:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - platformId
        - platformName
        - name
        - description
        - price
        - minOrder
        - maxOrder
        - status
        - createdAt

    CreateServiceBody:
      type: object
      properties:
        platformId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        minOrder:
          type: integer
        maxOrder:
          type: integer
        status:
          type: string
          enum: [active, inactive]
      required:
        - platformId
        - name
        - description
        - price
        - minOrder
        - maxOrder
        - status

    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        serviceId:
          type: integer
        serviceName:
          type: string
        platformName:
          type: string
        link:
          type: string
        quantity:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, cancelled, failed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userName
        - serviceId
        - serviceName
        - platformName
        - link
        - quantity
        - totalPrice
        - status
        - createdAt

    CreateOrderBody:
      type: object
      properties:
        serviceId:
          type: integer
        link:
          type: string
        quantity:
          type: integer
      required:
        - serviceId
        - link
        - quantity

    Payment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        amount:
          type: number
        method:
          type: string
          enum: [zaincash, asiahawala, stripe]
        status:
          type: string
          enum: [pending, approved, rejected]
        transactionId:
          type: string
        receiptUrl:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - userName
        - amount
        - method
        - status
        - createdAt

    CreatePaymentBody:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
          enum: [zaincash, asiahawala, stripe]
        transactionId:
          type: string
        receiptUrl:
          type: string
        notes:
          type: string
      required:
        - amount
        - method

    UploadReceiptBody:
      type: object
      properties:
        imageData:
          type: string
          description: Base64 encoded image data
        fileName:
          type: string
      required:
        - imageData
        - fileName

    UploadReceiptResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    BalanceResponse:
      type: object
      properties:
        balance:
          type: number
      required:
        - balance

    DashboardStats:
      type: object
      properties:
        balance:
          type: number
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        processingOrders:
          type: integer
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer
        totalSpent:
          type: number
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required:
        - balance
        - totalOrders
        - pendingOrders
        - processingOrders
        - completedOrders
        - cancelledOrders
        - totalSpent
        - recentOrders

    UpdateBalanceBody:
      type: object
      properties:
        balance:
          type: number
        operation:
          type: string
          enum: [set, add, subtract]
      required:
        - balance
        - operation

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, processing, completed, cancelled, failed]
      required:
        - status

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        pendingPayments:
          type: integer
        activeServices:
          type: integer
        activePlatforms:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recentPayments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
      required:
        - totalUsers
        - totalOrders
        - totalRevenue
        - pendingPayments
        - activeServices
        - activePlatforms
        - recentOrders
        - recentPayments
